apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-server
  template:
    metadata:
      labels:
        app: fl-server
    spec:
      containers:
      - name: server
        image: fl-app:v1
        imagePullPolicy: IfNotPresent  # IMPORTANT: Use local image
        command: ["python", "server.py"]

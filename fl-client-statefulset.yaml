apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fl-client
spec:
  serviceName: "fl-client"
  replicas: 3
  selector:
    matchLabels:
      app: fl-client
  template:
    metadata:
      labels:
        app: fl-client
    spec:
      containers:
      - name: client
        image: fl-app:v9
        imagePullPolicy: IfNotPresent
        command: ["python", "-u", "client.py"]
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        # Mount the volume to /app/results
        volumeMounts:
        - name: results-storage
          mountPath: /app/results
  # Request the storage automatically
  volumeClaimTemplates:
  - metadata:
      name: results-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 100Mi
